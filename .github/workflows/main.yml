name: JavaGoat-WhatsApp-Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4

      - name: Setup Node.js
        uses: actions/setup-node@1a5c5c6f8c9f6f8d8b0c6b1c3a2d4e5f6g7h8i9j   # v4 (replace with actual)
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Start AI Bot
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
        run: npm start
